spring.application.name=onlinebookstore

# ==========================================================
# MySQL Database Configuration
# ==========================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/onlinebookstore?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# JPA / Hibernate Configurations
# ==========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================================
# H2 Memory DB Configs (Uncomment to use H2 database)
# ==========================================================
# spring.datasource.url=${DB_URL:jdbc:h2:mem:onlinebookstore;DB_CLOSE_DELAY=-1}
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Server & Rendering Configurations
spring.thymeleaf.cache=false
server.port=${PORT:8081}


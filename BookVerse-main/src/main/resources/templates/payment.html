<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Gateway - Book Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>


    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="glass-container" style="max-width: 550px;">
            <h2 class="glass-title">Secure Payment</h2>
            
            <div class="text-center mb-4 py-3" style="background: rgba(0, 242, 254, 0.05); border-radius: 12px; border: 1px solid rgba(0, 242, 254, 0.2);">
                <p class="text-muted small m-0">Amount Due</p>
                <h3 style="color:#00f2fe; font-weight:700;" th:text="'₹' + ${amountToPay}">₹0.00</h3>
            </div>

            <div th:if="${not #lists.isEmpty(cartList)}" class="mb-4">
                <h5 class="text-white" style="font-weight:600;">Order Summary</h5>
                <div class="glass-table-container" style="padding: 16px;">
                    <table class="glass-table mb-0" style="border:none;">
                        <thead>
                            <tr>
                                <th class="text-muted" style="font-weight:500;">Book</th>
                                <th class="text-muted" style="font-weight:500; text-align:center;">Qty</th>
                                <th class="text-muted" style="font-weight:500; text-align:right;">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${cartList}">
                                <td th:text="${item.book.name}">Book name</td>
                                <td th:text="${item.quantity}" style="text-align:center;">0</td>
                                <td th:text="'₹' + ${item.book.price * item.quantity}" style="text-align:right;">₹0.00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <form th:action="@{/pay}" method="post">
                <div class="form-group">
                    <label class="text-muted small">Cardholder Name</label>
                    <input type="text" name="cardholder" class="form-control glass-input" placeholder="Enter Cardholder Name" required>
                </div>

                <div class="form-group">
                    <label class="text-muted small">Card Number</label>
                    <input type="text" name="cardnumber" class="form-control glass-input" placeholder="0000 0000 0000 0000" pattern="[0-9]{16}" title="16-digit card number" required>
                </div>

                <div class="form-row">
                    <div class="col-md-6 form-group">
                        <label class="text-muted small">Expiry Date</label>
                        <input type="text" placeholder="MM/YY" class="form-control glass-input" required>
                    </div>
                    <div class="col-md-6 form-group">
                        <label class="text-muted small">CVV</label>
                        <input type="password" name="cvv" placeholder="***" class="form-control glass-input" pattern="[0-9]{3}" title="3-digit CVV" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-block btn-glass mt-4">💳 Pay Now</button>
            </form>
            
            <div class="text-center mt-3">
                <a th:href="@{/cart}" class="small text-muted">Cancel and return to Cart</a>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>

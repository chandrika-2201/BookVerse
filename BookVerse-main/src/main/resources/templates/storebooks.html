<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store Inventory - Book Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <div class="container-fluid" style="width: 90%; margin-top: 40px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="glass-title text-left m-0">Books Available In the Store</h2>
            <button class="btn-glass" onclick="window.location.href='/addbook'">Add New Book ➕</button>
        </div>

        <div class="glass-table-container">
            <div th:if="${#lists.isEmpty(books)}" class="text-center py-5">
                <h4 style="color:#00f2fe">No Books Available in the store</h4>
            </div>

            <table class="glass-table" th:if="${not #lists.isEmpty(books)}">
                <thead>
                    <tr>
                        <th>BookId/Barcode</th>
                        <th>Book Name</th>
                        <th>Author</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.barcode}">BookId</td>
                        <td th:text="${book.name}" style="font-weight:600; color:#ffffff;">Name</td>
                        <td th:text="${book.author}">Author</td>
                        <td th:text="'₹' + ${book.price}">Price</td>
                        <td th:text="${book.quantity}">Quantity</td>
                        <td style="text-align: center;">
                            <form th:action="@{/updatebook}" method="post">
                                <input type="hidden" name="barcode" th:value="${book.barcode}">
                                <button type="submit" class="btn-glass btn-sm">Update ✏️</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>

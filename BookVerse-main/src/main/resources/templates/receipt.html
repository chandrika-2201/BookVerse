<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Receipt - Book Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>


    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="glass-container" style="max-width: 650px; padding: 40px 50px;">
            <h2 class="glass-title" style="color:#38ef7d; font-weight:700;">🎉 Payment Successful!</h2>
            <p class="text-center text-muted mb-4">Thank you for your purchase, <strong th:text="${firstName + ' ' + lastName}">Customer</strong>!</p>
            <hr style="border-top:1px solid rgba(255,255,255,0.08);" class="my-4">
            
            <h5 class="mb-3" style="color:#00f2fe; font-weight:600;">Order Invoice Details:</h5>
            <table class="table table-borderless text-white mb-4" style="background: rgba(255,255,255,0.01); border-radius: 12px; border:1px solid rgba(255,255,255,0.05);">
                <thead>
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.08);">
                        <th style="color:#65738c; font-weight:500;">Book Name</th>
                        <th style="color:#65738c; font-weight:500; text-align:center;">Qty</th>
                        <th style="color:#65738c; font-weight:500; text-align:right;">Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${receiptItems}">
                        <td th:text="${item.book.name}">Book Name</td>
                        <td th:text="${item.quantity}" style="text-align:center;">Qty</td>
                        <td th:text="'₹' + ${item.book.price * item.quantity}" style="text-align:right; font-weight:500;">Subtotal</td>
                    </tr>
                    
                    <tr style="border-top: 1px solid rgba(255,255,255,0.08); background: rgba(56, 239, 125, 0.05);">
                        <td style="color:#38ef7d; font-weight:600;">Total Paid</td>
                        <td></td>
                        <td th:text="'₹' + ${totalAmount}" style="text-align:right; color:#38ef7d; font-weight:700; font-size:16px;">₹0.00</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="text-center mt-4 d-flex justify-content-center align-items-center flex-wrap">
                <a th:href="@{/CustomerHome}" class="btn-glass px-4 mx-2 my-2" style="color: #000000; text-decoration: none;">Return to Dashboard</a>
                <a th:href="@{/orderhistory}" class="btn-glass-success px-4 mx-2 my-2" style="color: #000000; text-decoration: none; padding: 12px 30px;">View Order History</a>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Remove Book - Book Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-custom">
            <a class="navbar-brand" th:href="@{/SellerHome}">Online Book Store</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon" style="color:white; font-size:24px;">☰</span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/SellerHome}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/storebooks}">Store Books</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/addbook}">Add Books</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/removebook}">Remove Books</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="glass-container" style="max-width: 550px;">
            <h2 class="glass-title">Remove Book from Store</h2>
            
            <div th:if="${status}" class="text-center py-3 mb-4">
                <div th:if="${status == 'SUCCESS'}" class="alert alert-success bg-transparent text-success border-success small">
                    Book (ID: <span th:text="${bookId}"></span>) Removed Successfully!
                </div>
                <div th:if="${status != 'SUCCESS'}" class="alert alert-danger bg-transparent text-danger border-danger small">
                    Failed to Remove Book: Not Available in Store or Error occurred
                </div>
                <a th:href="@{/removebook}" class="btn-glass btn-sm mt-3 d-inline-block text-decoration-none" style="color:#000;">Remove more Books</a>
            </div>

            <form th:action="@{/removebook}" method="post" th:if="${status == null}">
                <div class="form-group">
                    <label for="bookCode" class="text-muted small">Enter BookId / Barcode to Remove</label>
                    <input type="text" name="bookId" id="bookCode" class="form-control glass-input" placeholder="Enter Book Code" required>
                </div>

                <button type="submit" class="btn btn-block btn-glass btn-glass-danger mt-4">❌ Remove Book</button>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Register - Book Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-custom">
            <a class="navbar-brand" th:href="@{/}">Online Book Store</a>
        </nav>
    </header>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh; margin-top:30px; margin-bottom:30px;">
        <div class="glass-container" style="max-width:600px;">
            <h2 class="glass-title">Customer Register</h2>
            
            <div th:if="${error}" class="alert alert-danger bg-transparent text-danger border-danger small text-center mb-4" th:text="${error}">
                Error Message
            </div>

            <form th:action="@{/userreg}" method="post">
                <div class="form-group">
                    <label class="text-muted small">Email Address (Used as Username)</label>
                    <input type="email" name="mailid" class="form-control glass-input" placeholder="Enter Email" required>
                </div>

                <div class="form-row">
                    <div class="col-md-6 form-group">
                        <label class="text-muted small">First Name</label>
                        <input type="text" name="firstname" class="form-control glass-input" placeholder="First Name" required>
                    </div>
                    <div class="col-md-6 form-group">
                        <label class="text-muted small">Last Name</label>
                        <input type="text" name="lastname" class="form-control glass-input" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="text-muted small">Password</label>
                    <input type="password" name="password" class="form-control glass-input" placeholder="Password" required>
                </div>

                <div class="form-group">
                    <label class="text-muted small">Address</label>
                    <textarea name="address" class="form-control glass-input" placeholder="Enter your full address" rows="2" required></textarea>
                </div>

                <div class="form-group">
                    <label class="text-muted small">Phone Number</label>
                    <input type="number" name="phone" class="form-control glass-input" placeholder="Phone Number" required>
                </div>

                <div class="form-group form-check mb-4">
                    <input type="checkbox" name="acceptance" class="form-check-input" id="terms" required>
                    <label class="form-check-label text-muted small" for="terms">I accept all Terms & Conditions</label>
                </div>

                <button type="submit" class="btn btn-block btn-glass">REGISTER ME</button>
            </form>
            
            <div class="text-center mt-3">
                <a th:href="@{/CustomerLogin}" style="color:#00f2fe" class="small">Already registered? Log in here</a>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Login - Book Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-custom">
            <a class="navbar-brand" th:href="@{/}">Online Book Store</a>
        </nav>
    </header>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="glass-container">
            <h2 class="glass-title">Customer Login</h2>
            
            <div th:if="${param.error}" class="alert alert-danger bg-transparent text-danger border-danger small text-center mb-4">
                Incorrect UserName or PassWord
            </div>
            
            <div th:if="${message}" class="alert alert-success bg-transparent text-success border-success small text-center mb-4" th:text="${message}">
                Message
            </div>

            <form th:action="@{/userlog}" method="post">
                <div class="form-group">
                    <label for="emailId" class="text-muted small">Email Address</label>
                    <input type="email" name="emailId" id="emailId" class="form-control glass-input" placeholder="Enter your Email ID" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="text-muted small">Password</label>
                    <input type="password" name="password" id="password" class="form-control glass-input" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn btn-block btn-glass mt-4">Login as Customer</button>
            </form>
            
            <div class="text-center mt-4">
                <a th:href="@{/CustomerRegister}" style="color:#00f2fe" class="small">New User? Register Here</a>
                <br/>
                <a th:href="@{/SellerLogin}" class="small text-muted">Are you an Admin? Click here</a>
            </div>
        </div>
    </div>
</body>
</html>

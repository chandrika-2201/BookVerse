<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History - Book Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <div class="container-fluid" style="width: 90%; margin-top: 40px; margin-bottom: 40px;">
        <h2 class="glass-title text-left mb-4">📋 Order History</h2>

        <div class="glass-table-container">
            <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
                <h4 style="color:#00f2fe">No Orders Yet 📭</h4>
                <p class="text-muted">You haven't placed any orders yet. Start shopping now!</p>
                <a th:href="@{/viewbook}" class="btn-glass mt-4 d-inline-block text-decoration-none" style="color:#000;">Browse Books</a>
            </div>

            <table class="glass-table" th:if="${not #lists.isEmpty(orders)}">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Book Name</th>
                        <th>Quantity</th>
                        <th>Price/Item</th>
                        <th>Subtotal</th>
                        <th>Order Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.orderId}" style="color:#00f2fe; font-weight:600;">#Order ID</td>
                        <td th:text="${order.bookName}" style="font-weight:600;">Book Name</td>
                        <td th:text="${order.quantity}" style="text-align:center;">Qty</td>
                        <td th:text="'₹' + ${order.pricePerItem}">Price</td>
                        <td th:text="'₹' + ${order.subtotal}" style="font-weight:600; color:#38ef7d;">Subtotal</td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd-MMM-yyyy HH:mm')}">Date</td>
                        <td>
                            <span style="color:#38ef7d; font-weight:600;" th:text="${order.status}">Status</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/CustomerHome}" class="btn-glass px-5">Back to Dashboard</a>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Book Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-custom">
            <a class="navbar-brand" th:href="@{/}">Online Book Store</a>
        </nav>
    </header>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="glass-container">
            <h2 class="glass-title">Admin Login</h2>
            
            <div th:if="${param.error}" class="alert alert-danger bg-transparent text-danger border-danger small text-center mb-4">
                Incorrect UserName or PassWord
            </div>

            <form th:action="@{/adminlog}" method="post">
                <div class="form-group">
                    <label for="username" class="text-muted small">Username</label>
                    <input type="text" name="username" id="username" class="form-control glass-input" placeholder="Enter Admin Username" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="text-muted small">Password</label>
                    <input type="password" name="password" id="password" class="form-control glass-input" placeholder="Enter Password" required>
                </div>
                
                <button type="submit" class="btn btn-block btn-glass mt-4">Login as Admin 🔑</button>
            </form>
            
            <div class="text-center mt-4">
                <a th:href="@{/CustomerLogin}" style="color:#00f2fe" class="small">Not an Admin? Click here to Login as Customer</a>
            </div>
        </div>
    </div>
</body>
</html>
